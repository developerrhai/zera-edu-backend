version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: zera_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_1234
      MYSQL_DATABASE: zera_edu_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwhynot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: zera_backend_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=mysql://root:root_password_1234@db:3306/zera_edu_db
      - JWT_SECRET=zera_production_jwt_access_secret_998877
      - JWT_REFRESH_SECRET=zera_production_jwt_refresh_secret_665544
      - FRONTEND_ORIGIN=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
